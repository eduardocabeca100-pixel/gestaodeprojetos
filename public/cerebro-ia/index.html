<style>
:root{--bg:#f7f8fc;--panel:#fff;--ink:#172033;--muted:#667085;--line:#e8ecf4;--primary:#7c3aed;--pink:#db2777;--green:#16a34a;--red:#ef4444;--blue:#2563eb;--amber:#d97706;--shadow:0 18px 50px rgba(17,24,39,.08);--r:22px}*{box-sizing:border-box}body{margin:0;background:linear-gradient(135deg,#f8fbff,#f7f2ff 55%,#fff8fb);color:var(--ink);font:13px/1.45 Inter,system-ui,-apple-system,Segoe UI,Arial,sans-serif}button,input,textarea,select{font:inherit}button{cursor:pointer}.app{display:grid;grid-template-columns:226px 1fr;min-height:100vh}.side{background:rgba(255,255,255,.86);backdrop-filter:blur(18px);border-right:1px solid var(--line);padding:14px;position:sticky;top:0;height:100vh;display:flex;flex-direction:column}.brand{display:flex;gap:10px;align-items:center;margin:2px 0 24px}.logo{width:38px;height:38px;border-radius:14px;background:linear-gradient(135deg,var(--primary),var(--pink));color:#fff;display:grid;place-items:center;font-weight:900}.brand b{font-size:14px}.muted{color:var(--muted)}.small{font-size:11px}.nav{display:grid;gap:6px}.nav small{font-size:10px;letter-spacing:.12em;text-transform:uppercase;color:#7b8496;margin:10px 6px 5px}.nav button{height:38px;border:0;background:transparent;border-radius:999px;text-align:left;padding:0 12px;color:#344054;font-weight:800;display:flex;align-items:center;gap:9px}.nav button:hover,.nav button.active{background:#f1edff;color:#5b21b6}.userbox{margin-top:auto;border:1px solid var(--line);border-radius:18px;padding:12px;background:#fff}.main{min-width:0}.top{height:72px;border-bottom:1px solid var(--line);background:rgba(255,255,255,.72);backdrop-filter:blur(18px);position:sticky;top:0;z-index:10;display:flex;justify-content:space-between;align-items:center;padding:0 22px}.top h1{font-size:22px;margin:0}.top p{margin:2px 0 0}.content{padding:22px;max-width:1240px;margin:0 auto}.row{display:flex;gap:8px;align-items:center;flex-wrap:wrap}.between{display:flex;justify-content:space-between;align-items:center;gap:12px;flex-wrap:wrap}.grid{display:grid;gap:14px}.cols2{grid-template-columns:repeat(2,minmax(0,1fr))}.cols3{grid-template-columns:repeat(3,minmax(0,1fr))}.cols4{grid-template-columns:repeat(4,minmax(0,1fr))}.card,.metric,.item,.notice,.upload,.workspaceHead{background:rgba(255,255,255,.94);border:1px solid var(--line);border-radius:var(--r);box-shadow:var(--shadow)}.card{padding:16px}.metric{padding:16px}.metric span{display:block;color:var(--muted);font-size:11px;text-transform:uppercase;letter-spacing:.08em;font-weight:900}.metric b{font-size:24px}.list{display:grid;gap:10px}.item{padding:12px;display:flex;justify-content:space-between;gap:12px;align-items:center}.notice{padding:12px;background:#f8fbff}.upload{padding:22px;text-align:center;border-style:dashed;background:#fff}.btn{border:0;border-radius:999px;height:36px;padding:0 16px;font-weight:900;background:#eef2f7;color:#344054;box-shadow:0 8px 18px rgba(15,23,42,.05)}.btn:hover{filter:brightness(.98);transform:translateY(-1px)}.btn.primary{background:linear-gradient(90deg,var(--primary),var(--pink));color:#fff}.btn.green{background:var(--green);color:#fff}.btn.red{background:#fee2e2;color:#991b1b}.btn.blue{background:#dbeafe;color:#1e40af}.btn.light{background:#fff;border:1px solid var(--line)}.btn.sm{height:30px;padding:0 12px;font-size:12px}.pill{display:inline-flex;align-items:center;border-radius:999px;padding:5px 9px;background:#f3f4f6;font-size:11px;font-weight:900}.pill.green{background:#dcfce7;color:#166534}.pill.blue{background:#dbeafe;color:#1e40af}.pill.red{background:#fee2e2;color:#991b1b}.pill.amber{background:#fef3c7;color:#92400e}.field{display:grid;gap:6px}.field label{font-weight:900;color:#344054}.field input,.field textarea,.field select{width:100%;border:1px solid #d9dfeb;border-radius:18px;padding:12px;background:#fff;color:#111827;outline:none}.field textarea{min-height:120px;resize:vertical}.field input:focus,.field textarea:focus,.field select:focus{border-color:#a78bfa;box-shadow:0 0 0 4px rgba(124,58,237,.10)}.tabs,.chips{display:flex;gap:8px;overflow:auto;padding:7px;background:#fff;border:1px solid var(--line);border-radius:999px;box-shadow:var(--shadow)}.tabs button,.chips button{height:34px;padding:0 14px;border:0;border-radius:999px;background:transparent;font-weight:900;white-space:nowrap;color:#475467}.tabs button.active,.chips button.active{background:linear-gradient(90deg,var(--primary),var(--pink));color:white}.progress{height:8px;border-radius:999px;background:#edf1f7;overflow:hidden}.progress i{display:block;height:100%;background:linear-gradient(90deg,var(--primary),var(--pink));border-radius:999px}.workspaceHead{padding:16px}.editor{width:100%;min-height:360px;border:1px solid #d9dfeb;border-radius:22px;padding:16px;background:#fff;color:#111827;resize:vertical;line-height:1.62;font-size:14px}.helper{background:#eff6ff;border:1px solid #bfdbfe;color:#1e3a8a;border-radius:16px;padding:10px 12px;font-size:12px;margin:12px 0}.modal{position:fixed;inset:0;background:rgba(15,23,42,.45);display:none;place-items:center;padding:18px;z-index:99}.modal.show{display:grid}.modalbox{background:white;border-radius:26px;box-shadow:0 30px 90px rgba(0,0,0,.25);width:min(940px,96vw);max-height:90vh;overflow:auto;padding:18px}.toast{position:fixed;right:18px;bottom:18px;background:#111827;color:#fff;padding:12px 14px;border-radius:16px;opacity:0;transform:translateY(10px);transition:.2s;z-index:120;max-width:360px}.toast.show{opacity:1;transform:translateY(0)}.empty{padding:28px;text-align:center;color:var(--muted);border:1px dashed var(--line);border-radius:18px;background:#fff}@media(max-width:980px){.app{grid-template-columns:1fr}.side{position:relative;height:auto}.cols2,.cols3,.cols4{grid-template-columns:1fr}.top{position:relative;height:auto;padding:16px}.tabs{border-radius:20px}.content{padding:14px}.item{align-items:flex-start;flex-direction:column}}

<body>
<div class="app">
  <aside class="side">
    <div class="brand"><div class="logo">C</div><div><b>CÉREBRO IA</b><br><span class="muted small">Projetos culturais aprováveis</span></div></div>
    <nav class="nav" id="nav"></nav>
    <div class="userbox"><b>Eduardo</b><br><span class="muted small">admin@cerebroia.app</span><div style="height:10px"></div><button class="btn light" style="width:100%" data-action="logout">Sair</button></div>
  </aside>
  <main class="main">
    <header class="top"><div><h1 id="pageTitle">Painel</h1><p class="muted" id="pageSub"></p></div><div class="row"><button class="btn light sm" data-action="backup">Backup</button><button class="btn primary sm" data-page="new">+ Novo Projeto</button></div></header>
    <section class="content" id="app"></section>
  </main>
</div>
<div class="modal" id="modal"><div class="modalbox" id="modalbox"></div></div><div class="toast" id="toast"></div>
<script>
'use strict';
const KEY='cerebroia_comercial_v2';
const NAV=[['dashboard','▦','Painel'],['projects','▣','Meus Projetos'],['new','+','Novo Projeto IA'],['team','♟','Equipe'],['opportunities','⌕','Oportunidades'],['review','✦','Aumente sua Nota'],['tips','?','Dicas'],['users','☷','Usuários'],['settings','⚙','Configurações'],['support','!','Suporte']];
const BLOCKS={
'Objeto da Proposta':`Realizar o projeto cultural “O Poço”, composto por apresentações teatrais gratuitas e ações formativas em Jaraguá do Sul/SC, com foco na democratização do acesso às artes cênicas, na formação de público e na valorização da produção artística local. A proposta prevê circulação do espetáculo, mediação cultural com o público participante e organização de materiais artísticos e documentais necessários à execução e prestação de contas.`,
'Justificativa':`A realização do projeto se justifica pela necessidade de ampliar o acesso da população às artes cênicas, especialmente em contextos nos quais a oferta cultural gratuita ainda é limitada. A proposta fortalece a produção teatral local, promove formação de público e aproxima a comunidade de experiências artísticas capazes de estimular reflexão, sensibilidade, convivência e participação social.`,
'Plano de comunicação':`A comunicação será realizada por meio de divulgação digital, materiais gráficos e articulação com instituições, escolas, espaços culturais e redes comunitárias. Serão utilizados cards para redes sociais, textos de apresentação, registros fotográficos autorizados, divulgação em grupos locais e contato direto com parceiros estratégicos.`,
'Público Alvo':`O projeto é direcionado ao público em geral, com prioridade para estudantes, jovens, famílias, educadores, artistas, agentes culturais e moradores de comunidades com menor acesso a atividades culturais gratuitas.`,
'Acessibilidade':`O projeto observará medidas de acessibilidade compatíveis com sua estrutura e orçamento, incluindo comunicação clara sobre datas, locais e formas de participação, organização do espaço para acolhimento do público e busca por recursos acessíveis conforme as exigências do edital.`,
'Contrapartida Social':`Como contrapartida social, o projeto oferecerá apresentações gratuitas e ação formativa de mediação cultural, promovendo acesso democrático à produção teatral e diálogo com a comunidade.`,
'Cronograma':`O cronograma será organizado em etapas de pré-produção, produção, execução e pós-produção. Na pré-produção serão realizadas reuniões, ajustes de roteiro, definição de equipe e organização documental. Na produção ocorrerão ensaios, comunicação, preparação de figurino e materiais. Na execução serão realizadas as apresentações e ações formativas. Na pós-produção serão reunidos registros, relatórios e comprovantes.`,
'Equipe':`A equipe será composta por profissionais vinculados às artes cênicas, produção cultural, execução técnica, comunicação e gestão administrativa do projeto. Cada integrante terá função definida conforme sua experiência, currículo e responsabilidade dentro da proposta.`,
'Orçamento':`O orçamento será distribuído de forma coerente com o valor total do projeto, contemplando cachês artísticos e técnicos, produção executiva, comunicação, materiais de cena, acessibilidade, documentação e prestação de contas.`
};
function uid(p){return p+Math.random().toString(36).slice(2,9)}
function money(v){return Number(v||0).toLocaleString('pt-BR',{style:'currency',currency:'BRL'})}
function esc(s){return String(s??'').replace(/[&<>"]/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[m]))}
function nl(s){return esc(s).replace(/\n/g,'<br>')}
function val(id){return document.getElementById(id)?.value?.trim()||''}
function seed(){return{page:'dashboard',tab:'analysis',block:'Objeto da Proposta',q:'',filters:{uf:'SC',fonte:'Todos',ling:'Todos'},settings:{name:'CÉREBRO IA',defaultPass:'Cerebro@2026',apiMode:'Mockup local'},users:[{id:'u1',name:'Eduardo',email:'admin@cerebroia.app',role:'Administrador',active:true}],team:[{id:'t1',name:'Eduardo Cabeça',art:'Eduardo Cabeça',role:'Direção geral / dramaturgia',area:'Teatro',cpf:'000.000.000-00',cnpj:'',birth:'1998-12-12',city:'Jaraguá do Sul/SC',address:'Endereço a cadastrar',phone:'',email:'',fee:1800,resume:'Ator, diretor, escritor de teatro e produtor cultural, com trajetória em artes cênicas e criação de projetos culturais.',portfolio:'Experiência em teatro, escrita, direção, produção cultural, projetos artísticos e ações de formação.',links:'Instagram:\nPortfólio:\nDrive:',docs:'CPF/RG — pendente\nComprovante de residência — pendente\nCurrículo — ok\nPortfólio — pendente'}],projects:[{id:'p1',title:'O Poço',proponent:'Eduardo Cabeça',budget:10000,uf:'SC',city:'Jaraguá do Sul/SC',edital:'Edital Chamamento Público nº 25/2026 — Meu Primeiro Projeto Cultural',status:'Em construção',score:82,progress:70,updated:'Agora',idea:'Projeto teatral com apresentação gratuita, mediação cultural e impacto social.',team:['t1'],blocks:{...BLOCKS}}],opportunities:[]}}
let state=load();function load(){try{return JSON.parse(localStorage.getItem(KEY))||seed()}catch(e){return seed()}}function save(){localStorage.setItem(KEY,JSON.stringify(state))}
function toast(t){const el=document.getElementById('toast');el.textContent=t;el.classList.add('show');clearTimeout(window.__toast);window.__toast=setTimeout(()=>el.classList.remove('show'),2400)}
function title(a,b=''){document.getElementById('pageTitle').textContent=a;document.getElementById('pageSub').textContent=b}
function show(html){document.getElementById('app').innerHTML=html}function modal(html){document.getElementById('modalbox').innerHTML=html;document.getElementById('modal').classList.add('show')}function closeModal(){document.getElementById('modal').classList.remove('show')}
function page(p){state.page=p;save();render()}function current(){if(!state.projects.length)state.projects.push(seed().projects[0]);return state.projects[0]}function projectBy(id){return state.projects.find(p=>p.id===id)}function openProject(id){const i=state.projects.findIndex(p=>p.id===id);if(i>=0){state.projects.unshift(...state.projects.splice(i,1));state.page='workspace';state.tab='analysis';save();render();toast('Projeto aberto.')}}function render(){renderNav();const map={dashboard:renderDash,projects:renderProjects,new:renderNew,team:renderTeam,opportunities:renderOpps,review:()=>{state.page='workspace';state.tab='review';save();renderWorkspace()},tips:renderTips,users:renderUsers,settings:renderSettings,support:renderSupport,workspace:renderWorkspace};(map[state.page]||renderDash)()}
function renderNav(){document.getElementById('nav').innerHTML='<small>Navegação</small>'+NAV.map(n=>`<button class="${state.page===n[0]?'active':''}" data-page="${n[0]}"><span>${n[1]}</span>${n[2]}</button>`).join('')}
function projectCard(p){return`<div class="item"><div><b>${esc(p.title)}</b><br><span class="muted small">${esc(p.edital)} • ${money(p.budget)} • ${esc(p.status)}</span><div class="progress" style="margin-top:8px"><i style="width:${p.progress||0}%"></i></div></div><div class="row"><span class="pill green">${p.score}/100</span><button class="btn sm primary" data-action="open-project" data-id="${p.id}">Continuar</button></div></div>`}
function renderDash(){title('Painel','Controle completo dos projetos culturais');const ps=state.projects;show(`<div class="grid cols4"><div class="metric"><span>Projetos</span><b>${ps.length}</b></div><div class="metric"><span>Nota média</span><b>${Math.round(ps.reduce((a,p)=>a+(p.score||0),0)/(ps.length||1))}</b></div><div class="metric"><span>Equipe</span><b>${state.team.length}</b></div><div class="metric"><span>Usuários</span><b>${state.users.length}</b></div></div><div style="height:14px"></div><div class="grid cols2"><div class="card"><div class="between"><h2>Projetos recentes</h2><button class="btn sm light" data-page="projects">Ver todos</button></div><div class="list" style="margin-top:12px">${ps.map(projectCard).join('')}</div></div><div class="card"><h2>Próximas ações</h2><div class="list"><div class="item"><b>Revisar blocos obrigatórios</b><button class="btn sm primary" data-action="open-project-tab" data-id="${current().id}" data-tab="text">Abrir</button></div><div class="item"><b>Completar documentos da equipe</b><button class="btn sm light" data-page="team">Equipe</button></div><div class="item"><b>Buscar editais em aberto</b><button class="btn sm light" data-page="opportunities">Oportunidades</button></div></div></div></div>`)}
function renderProjects(){title('Meus Projetos','Projetos salvos para continuar depois sem perder material');show(`<div class="card"><div class="between"><div><h2>Projetos salvos</h2><p class="muted">Na versão comercial, estes dados ficarão no banco com login e backup.</p></div><button class="btn primary" data-page="new">+ Criar projeto</button></div><div class="list" style="margin-top:14px">${state.projects.map(p=>`<div class="item"><div><b>${esc(p.title)}</b><br><span class="muted small">${esc(p.proponent)} • ${esc(p.city)} • ${money(p.budget)} • atualizado ${esc(p.updated)}</span></div><div class="row"><button class="btn sm primary" data-action="open-project" data-id="${p.id}">Continuar</button><button class="btn sm light" data-action="dup-project" data-id="${p.id}">Duplicar</button><button class="btn sm red" data-action="del-project" data-id="${p.id}">Excluir</button></div></div>`).join('')}</div></div>`)}
function dupProject(id){const p=projectBy(id);if(!p)return;state.projects.unshift({...JSON.parse(JSON.stringify(p)),id:uid('p'),title:p.title+' — cópia',updated:'Agora'});save();renderProjects();toast('Projeto duplicado.')}function delProject(id){if(!confirm('Excluir este projeto?'))return;state.projects=state.projects.filter(p=>p.id!==id);if(!state.projects.length)state.projects.push(seed().projects[0]);save();renderProjects();toast('Projeto excluído.')}
function renderNew(){title('Novo Projeto IA','Crie projeto a partir de ideia, edital e anexos');show(`<div class="card"><h2>Informações do projeto</h2><div class="grid cols2"><div class="field"><label>Título</label><input id="npTitle" value="O Poço"></div><div class="field"><label>Proponente</label><input id="npProp" value="Eduardo Cabeça"></div><div class="field"><label>Valor total</label><input id="npBudget" type="number" value="10000"></div><div class="field"><label>UF / Cidade</label><input id="npCity" value="Jaraguá do Sul/SC"></div><div class="field"><label>Linguagem</label><select id="npLang"><option>Teatro</option><option>Dança</option><option>Música</option><option>Audiovisual</option><option>Formação</option></select></div><div class="field"><label>Edital</label><input id="npEdital" value="Edital cultural em análise"></div></div><div class="field" style="margin-top:12px"><label>Ideia inicial</label><textarea id="npIdea">Projeto teatral com apresentação gratuita, mediação cultural e impacto social.</textarea></div><div class="grid cols2" style="margin-top:12px"><label class="upload"><b>Edital principal em PDF</b><br><span class="muted">Regulamento/chamada pública.</span><br><br><input id="npPdf" type="file" accept=".pdf"></label><label class="upload"><b>Anexos e modelos</b><br><span class="muted">Planilhas, declarações e formulários.</span><br><br><input id="npFiles" type="file" multiple></label></div><div class="row" style="margin-top:16px"><button class="btn light" data-page="projects">Cancelar</button><button class="btn light" data-action="save-draft">Salvar rascunho</button><button class="btn primary" data-action="analyze-new">Analisar edital com IA</button></div></div>`)}
function makeProject(status){return{id:uid('p'),title:val('npTitle')||'Novo projeto',proponent:val('npProp')||'Proponente',budget:Number(val('npBudget')||0),city:val('npCity')||'',uf:(val('npCity').split('/')[1]||'SC').trim(),edital:val('npEdital')||'Edital em análise',status,score:status==='Em análise'?78:50,progress:status==='Em análise'?62:20,updated:'Agora',idea:val('npIdea'),team:[],blocks:{...BLOCKS}}}function saveDraft(){state.projects.unshift(makeProject('Rascunho'));save();page('projects');toast('Rascunho salvo.')}function analyzeNew(){state.projects.unshift(makeProject('Em análise'));state.page='workspace';state.tab='analysis';save();render();toast('Edital analisado e blocos criados.')}
function renderWorkspace(){const p=current();title(p.title,'Workspace do projeto');const tabs=[['analysis','✨ Análise'],['text','📄 Texto'],['review','✅ Revisão'],['budget','$ Orçamento'],['portfolio','💼 Portfólio'],['docs','📋 Docs'],['chat','💬 Chat IA']];show(`<div class="workspaceHead"><div class="between"><div><h2>${esc(p.title)}</h2><p class="muted">${esc(p.edital)} • ${esc(p.city)} • ${money(p.budget)}</p></div><div class="row"><span class="pill green">Nota ${p.score}/100</span><button class="btn light sm" data-action="download-project">Exportar</button></div></div><div class="tabs" style="margin-top:14px">${tabs.map(t=>`<button class="${state.tab===t[0]?'active':''}" data-action="tab" data-tab="${t[0]}">${t[1]}</button>`).join('')}</div></div><div style="height:14px"></div>${({analysis:tabAnalysis,text:tabText,review:tabReview,budget:tabBudget,portfolio:tabPortfolio,docs:tabDocs,chat:tabChat}[state.tab]||tabAnalysis)()}`)}
function tabAnalysis(){const p=current();return`<div class="grid cols3"><div class="metric"><span>Valor</span><b>${money(p.budget)}</b></div><div class="metric"><span>Progresso</span><b>${p.progress}%</b></div><div class="metric"><span>Risco</span><b>Baixo</b></div></div><div class="card" style="margin-top:14px"><h2>Análise do edital</h2><div class="list"><div class="item"><b>Documentos obrigatórios</b><span class="pill amber">currículos e portfólio</span></div><div class="item"><b>Critérios fortes</b><span class="pill blue">impacto, viabilidade e acesso</span></div><div class="item"><b>Valor analisado</b><span class="pill green">${money(p.budget)}</span></div></div></div>`}
function tabText(){const p=current();p.blocks=p.blocks||{...BLOCKS};if(!p.blocks[state.block])state.block=Object.keys(p.blocks)[0];const keys=Object.keys(p.blocks);return`<div class="card"><div class="between"><div><h2>Texto em blocos</h2><p class="muted">Blocos prontos para copiar e colar no edital.</p></div><div class="row"><button class="btn light sm" data-action="copy-block">Copiar</button><button class="btn primary sm" data-action="fix-block">Melhorar com IA</button><button class="btn light sm" data-action="save-block">Salvar</button></div></div><div class="chips" style="margin:12px 0">${keys.map(k=>`<button class="${state.block===k?'active':''}" data-action="block" data-block="${esc(k)}">${esc(k)}</button>`).join('')}</div><h3>${esc(state.block)}</h3><div class="helper"><b>O que deve abordar:</b> aderência ao edital, clareza, viabilidade, impacto cultural e coerência com orçamento.</div><textarea class="editor" id="editorText">${esc(p.blocks[state.block])}</textarea></div>`}
function saveBlock(){const p=current();if(!p.blocks)p.blocks={};p.blocks[state.block]=val('editorText');p.updated='Agora';save();toast('Bloco salvo.')}function copyBlock(){navigator.clipboard?.writeText(val('editorText'));toast('Texto copiado.')}function fixBlock(){const p=current();p.blocks[state.block]=val('editorText')+'\n\nRevisão IA aplicada: texto fortalecido com foco em clareza, critérios do edital, impacto cultural, viabilidade técnica e coerência orçamentária.';p.score=Math.min(100,(p.score||70)+3);p.progress=Math.min(100,(p.progress||60)+4);save();renderWorkspace();toast('Bloco melhorado.')}function applyAll(){const p=current();Object.keys(p.blocks||BLOCKS).forEach(k=>{p.blocks[k]=(p.blocks[k]||BLOCKS[k])+'\n\nRevisão IA aplicada: conteúdo ajustado para edital.'});p.score=Math.min(98,(p.score||75)+10);p.progress=Math.min(100,(p.progress||70)+12);save();state.tab='text';renderWorkspace();toast('Todas as melhorias aplicadas.')}
function tabReview(){return`<div class="card"><div class="between"><div><h2>Aumente sua nota</h2><p class="muted">O sistema aplica melhorias automaticamente nos blocos e no orçamento.</p></div><button class="btn primary" data-action="apply-all">Aplicar todas as melhorias</button></div><div class="list" style="margin-top:12px">${['Fortalecer justificativa','Detalhar acessibilidade','Conectar orçamento à metodologia','Melhorar contrapartida social','Explicar experiência da equipe'].map(x=>`<div class="item"><b>${x}</b><button class="btn sm light" data-action="apply-one">Aplicar</button></div>`).join('')}</div></div>`}
function tabBudget(){const p=current();const items=[['Coordenação geral',1800],['Elenco e equipe artística',3000],['Produção executiva',1200],['Comunicação',900],['Figurino/cenografia',800],['Técnica e equipamentos',1200],['Acessibilidade',600],['Prestação de contas',500]];return`<div class="card"><div class="between"><h2>Orçamento inteligente</h2><button class="btn primary sm" data-action="balance-budget">Ajustar automaticamente</button></div><div class="list" style="margin-top:12px">${items.map(i=>`<div class="item"><b>${i[0]}</b><span>${money(i[1])}</span></div>`).join('')}<div class="item"><b>Total previsto</b><b>${money(items.reduce((a,b)=>a+b[1],0))}</b></div><div class="item"><b>Teto do projeto</b><b>${money(p.budget)}</b></div></div></div>`}
function tabPortfolio(){const p=current();const selected=(p.team&&p.team.length?p.team:state.team.map(t=>t.id)).map(id=>state.team.find(t=>t.id===id)).filter(Boolean);return`<div class="grid cols2"><div class="card"><h2>Portfólio da equipe</h2><p class="muted">Currículos e portfólios vinculados ao projeto.</p><div class="row"><button class="btn light sm" data-action="copy-portfolio">Copiar resumo</button><button class="btn primary sm" data-page="team">Gerenciar equipe</button></div></div><div class="card"><h2>Integrantes</h2><div class="list">${selected.map(t=>`<div class="item"><div><b>${esc(t.name)}</b><br><span class="muted small">${esc(t.role)} • ${esc(t.area)}</span></div><button class="btn sm light" data-action="edit-team" data-id="${t.id}">Abrir</button></div>`).join('')}</div></div></div>`}
function tabDocs(){return`<div class="card"><h2>Documentos e anexos</h2><div class="list">${['Projeto completo em Word','Planilha orçamentária','Currículos da equipe','Portfólio','Carta de anuência','Checklist final'].map((x,i)=>`<div class="item"><b>${x}</b><span class="pill ${i<2?'green':'amber'}">${i<2?'pronto':'verificar'}</span></div>`).join('')}</div><div style="height:12px"></div><button class="btn primary" data-action="download-project">Exportar pacote</button></div>`}
function tabChat(){return`<div class="card"><h2>Chat IA do projeto</h2><div class="notice" id="chatBox">IA: Posso revisar o projeto, melhorar blocos, ajustar orçamento e conferir requisitos do edital.</div><div class="field" style="margin-top:12px"><label>Pergunta</label><textarea id="chatInput" placeholder="Ex.: melhore a justificativa"></textarea></div><button class="btn primary" data-action="send-chat">Enviar</button></div>`}
function renderTeam(){title('Equipe','Banco reutilizável de integrantes, currículos, portfólios e documentos');show(`<div class="card"><div class="between"><div><h2>Equipe cadastrada</h2><p class="muted">Adicione, edite, exclua e vincule integrantes ao projeto atual.</p></div><button class="btn primary" data-action="edit-team">+ Adicionar integrante</button></div><div class="grid cols3" style="margin-top:14px">${state.team.map(t=>`<div class="card"><div class="between"><div><b>${esc(t.name)}</b><br><span class="muted small">${esc(t.role)} • ${esc(t.city)}</span></div><span class="pill blue">${money(t.fee)}</span></div><p class="muted small">${esc(t.resume).slice(0,150)}...</p><div class="row"><button class="btn sm light" data-action="edit-team" data-id="${t.id}">Editar</button><button class="btn sm primary" data-action="select-team" data-id="${t.id}">Vincular</button><button class="btn sm red" data-action="del-team" data-id="${t.id}">Excluir</button></div></div>`).join('')}</div></div>`)}
function editTeam(id=''){const t=state.team.find(x=>x.id===id)||{name:'',art:'',role:'',area:'Teatro',cpf:'',cnpj:'',birth:'',city:'',address:'',phone:'',email:'',fee:1000,resume:'',portfolio:'',links:'',docs:''};modal(`<h2>${id?'Editar':'Novo'} integrante</h2><div class="grid cols2"><div class="field"><label>Nome completo</label><input id="tmName" value="${esc(t.name)}"></div><div class="field"><label>Nome artístico</label><input id="tmArt" value="${esc(t.art)}"></div><div class="field"><label>Função</label><input id="tmRole" value="${esc(t.role)}"></div><div class="field"><label>Área</label><input id="tmArea" value="${esc(t.area)}"></div><div class="field"><label>CPF</label><input id="tmCpf" value="${esc(t.cpf)}"></div><div class="field"><label>CNPJ</label><input id="tmCnpj" value="${esc(t.cnpj)}"></div><div class="field"><label>Nascimento</label><input type="date" id="tmBirth" value="${esc(t.birth)}"></div><div class="field"><label>Cidade/UF</label><input id="tmCity" value="${esc(t.city)}"></div><div class="field"><label>Telefone</label><input id="tmPhone" value="${esc(t.phone)}"></div><div class="field"><label>E-mail</label><input id="tmEmail" value="${esc(t.email)}"></div><div class="field"><label>Cachê padrão</label><input type="number" id="tmFee" value="${esc(t.fee)}"></div><div class="field"><label>Endereço</label><input id="tmAddress" value="${esc(t.address)}"></div><div class="field"><label>Currículo</label><textarea id="tmResume">${esc(t.resume)}</textarea></div><div class="field"><label>Portfólio</label><textarea id="tmPortfolio">${esc(t.portfolio)}</textarea></div><div class="field"><label>Links</label><textarea id="tmLinks">${esc(t.links)}</textarea></div><div class="field"><label>Documentos</label><textarea id="tmDocs">${esc(t.docs)}</textarea></div></div><div class="row" style="margin-top:12px"><button class="btn light" data-action="close-modal">Cancelar</button><button class="btn primary" data-action="save-team" data-id="${id}">Salvar</button></div>`)}
function saveTeam(id=''){let t=id?state.team.find(x=>x.id===id):{id:uid('t')};Object.assign(t,{name:val('tmName')||'Integrante sem nome',art:val('tmArt'),role:val('tmRole'),area:val('tmArea'),cpf:val('tmCpf'),cnpj:val('tmCnpj'),birth:val('tmBirth'),city:val('tmCity'),address:val('tmAddress'),phone:val('tmPhone'),email:val('tmEmail'),fee:Number(val('tmFee')||0),resume:val('tmResume'),portfolio:val('tmPortfolio'),links:val('tmLinks'),docs:val('tmDocs')});if(!id)state.team.push(t);save();closeModal();renderTeam();toast('Integrante salvo.')}function delTeam(id){if(!confirm('Excluir integrante?'))return;state.team=state.team.filter(t=>t.id!==id);state.projects.forEach(p=>p.team=(p.team||[]).filter(x=>x!==id));save();renderTeam();toast('Integrante excluído.')}function selectTeam(id){const p=current();p.team=p.team||[];if(!p.team.includes(id))p.team.push(id);save();toast('Integrante vinculado ao projeto atual.')}
function seedOpps(){return[{title:'Editais abertos — Ministério da Cultura',uf:'BR',fonte:'MinC',ling:'Todos',deadline:'Consultar',value:'Variável',url:'https://www.gov.br/cultura/pt-br/assuntos/editais/inscricoes-abertas'},{title:'Oportunidades — Mapa da Cultura',uf:'BR',fonte:'Mapa da Cultura',ling:'Todos',deadline:'Consultar',value:'Variável',url:'https://mapa.cultura.gov.br/oportunidades/'},{title:'Oportunidades — CIM-AMFRI / SC',uf:'SC',fonte:'Mapas SC',ling:'Todos',deadline:'Consultar',value:'Variável',url:'https://mapacultural.cim-amfri.sc.gov.br/oportunidades/'},{title:'Circuito Catarinense de Cultura 2026 — PNAB',uf:'SC',fonte:'FCC/FEPESE',ling:'Todos',deadline:'Consultar edital',value:'Variável',url:'https://circuitocatarinensedecultura2026.fepese.org.br/'},{title:'Central de Editais — Prosas',uf:'BR',fonte:'Prosas',ling:'Todos',deadline:'Consultar',value:'Variável',url:'https://produtos.prosas.com.br/editais'}]}
function renderOpps(){title('Oportunidades','Filtros por estado, fonte e linguagem');if(!state.opportunities.length)state.opportunities=seedOpps();const fs=state.filters;let arr=state.opportunities.filter(o=>(fs.uf==='Todos'||o.uf===fs.uf||o.uf==='BR')&&(fs.fonte==='Todos'||o.fonte===fs.fonte)&&(fs.ling==='Todos'||o.ling===fs.ling||o.ling==='Todos')&&(!state.q||o.title.toLowerCase().includes(state.q.toLowerCase())));show(`<div class="card"><div class="between"><div><h2>Editais em aberto</h2><p class="muted">O front está preparado. Busca real será conectada por backend em /api/oportunidades.</p></div><button class="btn primary" data-action="fetch-opps">Buscar na internet</button></div><div class="grid cols4" style="margin-top:12px"><div class="field"><label>Estado</label><select id="fUf" data-action="filter-uf">${['Todos','SC','PR','RS','SP','RJ','MG','MS','MT','GO','BA','PE','CE','PA','BR'].map(x=>`<option ${fs.uf===x?'selected':''}>${x}</option>`).join('')}</select></div><div class="field"><label>Fonte</label><select id="fFonte" data-action="filter-fonte">${['Todos','MinC','Mapa da Cultura','Mapas SC','FCC/FEPESE','Prosas'].map(x=>`<option ${fs.fonte===x?'selected':''}>${x}</option>`).join('')}</select></div><div class="field"><label>Linguagem</label><select id="fLing" data-action="filter-ling">${['Todos','Teatro','Dança','Música','Audiovisual','Formação'].map(x=>`<option ${fs.ling===x?'selected':''}>${x}</option>`).join('')}</select></div><div class="field"><label>Pesquisar</label><input id="fQ" data-action="filter-q" value="${esc(state.q)}" placeholder="palavra-chave"></div></div></div><div class="grid cols2" style="margin-top:14px">${arr.map((o,i)=>`<div class="card"><div class="between"><h3>${esc(o.title)}</h3><span class="pill blue">${esc(o.uf)}</span></div><p class="muted">Fonte: ${esc(o.fonte)} • Prazo: ${esc(o.deadline)} • Valor: ${esc(o.value)}</p><div class="row"><button class="btn sm light" data-action="open-url" data-url="${esc(o.url)}">Abrir edital</button><button class="btn sm primary" data-action="project-from-opp" data-index="${i}">Criar projeto</button><button class="btn sm light" data-action="save-opp">Salvar</button></div></div>`).join('')||'<div class="empty">Nenhuma oportunidade encontrada com estes filtros.</div>'}</div>`)}
function fetchOpps(){state.opportunities=seedOpps();save();renderOpps();toast('Busca simulada atualizada. Para internet real, conectar backend /api/oportunidades.')}function projectFromOpp(i){const o=state.opportunities[i];if(!o)return;state.projects.unshift({...seed().projects[0],id:uid('p'),title:'Projeto para '+o.title,edital:o.title,uf:o.uf,city:o.uf==='SC'?'Jaraguá do Sul/SC':'',updated:'Agora'});save();page('projects');toast('Projeto criado a partir da oportunidade.')}
function renderTips(){title('Dicas','Dicas práticas de otimização');show(`<div class="grid cols2">${['Evite justificativa genérica','Faça orçamento conversar com metodologia','Mostre democratização de acesso','Explique acessibilidade de forma operacional','Use currículo da equipe como prova de viabilidade','Revise se o edital permite cada despesa'].map(x=>`<div class="card"><h3>${x}</h3><p class="muted">Aplique este critério nos blocos para reduzir risco.</p><button class="btn sm primary" data-action="apply-all">Aplicar no projeto atual</button></div>`).join('')}</div>`)}
function renderUsers(){title('Usuários','Administração de acessos e perfis');show(`<div class="card"><div class="between"><h2>Usuários</h2><button class="btn primary" data-action="edit-user">+ Adicionar</button></div><div class="list" style="margin-top:12px">${state.users.map(u=>`<div class="item"><div><b>${esc(u.name)}</b><br><span class="muted small">${esc(u.email)} • ${esc(u.role)}</span></div><div class="row"><span class="pill ${u.active?'green':'red'}">${u.active?'ativo':'inativo'}</span><button class="btn sm light" data-action="edit-user" data-id="${u.id}">Editar</button><button class="btn sm red" data-action="del-user" data-id="${u.id}">Excluir</button></div></div>`).join('')}</div></div>`)}function editUser(id=''){const u=state.users.find(x=>x.id===id)||{name:'',email:'',role:'Editor'};modal(`<h2>${id?'Editar':'Novo'} usuário</h2><div class="grid cols2"><div class="field"><label>Nome</label><input id="usName" value="${esc(u.name)}"></div><div class="field"><label>E-mail</label><input id="usEmail" value="${esc(u.email)}"></div><div class="field"><label>Perfil</label><select id="usRole"><option ${u.role==='Administrador'?'selected':''}>Administrador</option><option ${u.role==='Editor'?'selected':''}>Editor</option><option ${u.role==='Leitor'?'selected':''}>Leitor</option></select></div><div class="field"><label>Senha temporária</label><input id="usPass" value="${esc(state.settings.defaultPass)}"></div></div><div class="row" style="margin-top:12px"><button class="btn light" data-action="close-modal">Cancelar</button><button class="btn primary" data-action="save-user" data-id="${id}">Salvar</button></div>`)}function saveUser(id=''){let u=id?state.users.find(x=>x.id===id):{id:uid('u'),active:true};Object.assign(u,{name:val('usName')||'Usuário',email:val('usEmail'),role:val('usRole')});state.settings.defaultPass=val('usPass')||state.settings.defaultPass;if(!id)state.users.push(u);save();closeModal();renderUsers();toast('Usuário salvo.')}function delUser(id){if(state.users.length<=1)return toast('Mantenha pelo menos um usuário.');if(!confirm('Excluir usuário?'))return;state.users=state.users.filter(u=>u.id!==id);save();renderUsers();toast('Usuário excluído.')}
function renderSettings(){title('Configurações','Parâmetros comerciais, IA, fontes e segurança');show(`<div class="grid cols2"><div class="card"><h2>Sistema</h2><div class="field"><label>Nome</label><input id="setName" value="${esc(state.settings.name)}"></div><div class="field"><label>Senha padrão temporária</label><input id="setPass" value="${esc(state.settings.defaultPass)}"></div><div class="field"><label>Modo IA</label><select id="setApi"><option ${state.settings.apiMode==='Mockup local'?'selected':''}>Mockup local</option><option ${state.settings.apiMode==='Backend seguro'?'selected':''}>Backend seguro</option></select></div><div style="height:10px"></div><button class="btn primary" data-action="save-settings">Salvar configurações</button></div><div class="card"><h2>Fontes de oportunidades</h2><div class="notice">Para vender o sistema, a busca de editais precisa passar por backend próprio, com cache, normalização por UF, prazo, fonte, valor, linguagem e link oficial.</div></div></div>`)}function saveSettings(){state.settings.name=val('setName');state.settings.defaultPass=val('setPass');state.settings.apiMode=val('setApi');save();toast('Configurações salvas.')}
function renderSupport(){title('Suporte','Diagnóstico e checklist técnico');show(`<div class="card"><h2>Verificação do sistema</h2><p class="muted">Clique no botão abaixo para testar a camada de navegação.</p><button class="btn primary" data-action="test-clicks">Testar cliques</button><div class="list" style="margin-top:12px">${['Navegação por delegação de eventos','Criar projeto','Continuar projeto','Editar/excluir equipe','Editar/excluir usuários','Blocos para edital','Filtros de oportunidades'].map(x=>`<div class="item"><b>${x}</b><span class="pill green">ok</span></div>`).join('')}</div></div>`)}
function backupData(){const blob=new Blob([JSON.stringify(state,null,2)],{type:'application/json'});download(blob,'cerebro-backup.json')}function download(blob,name){const a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download=name;a.click();URL.revokeObjectURL(a.href)}function downloadProject(){const p=current();let txt=`${p.title}\n${p.edital}\n${money(p.budget)}\n\n`;Object.entries(p.blocks||{}).forEach(([k,v])=>txt+=`\n${k}\n${v}\n`);download(new Blob([txt],{type:'text/plain'}),p.title.replace(/\s+/g,'-').toLowerCase()+'.txt');toast('Projeto exportado.')}function copyPortfolio(){const txt=state.team.map(t=>`${t.name} — ${t.role}\n${t.resume}\n${t.portfolio}`).join('\n\n');navigator.clipboard?.writeText(txt);toast('Portfólio copiado.')}function sendChat(){document.getElementById('chatBox').innerHTML+='\n\nVocê: '+esc(val('chatInput'))+'<br>IA: Sugiro revisar justificativa, acessibilidade e orçamento para aumentar a nota.';document.getElementById('chatInput').value=''}
document.addEventListener('click',e=>{const btn=e.target.closest('button');if(!btn)return;const pg=btn.dataset.page;if(pg){page(pg);return}const a=btn.dataset.action;const id=btn.dataset.id;try{({logout:()=>toast('Sessão local encerrada em simulação.'),backup:backupData,'open-project':()=>openProject(id),'open-project-tab':()=>{openProject(id);state.tab=btn.dataset.tab;save();render()},'dup-project':()=>dupProject(id),'del-project':()=>delProject(id),'save-draft':saveDraft,'analyze-new':analyzeNew,tab:()=>{state.tab=btn.dataset.tab;save();renderWorkspace()},block:()=>{state.block=btn.dataset.block;save();renderWorkspace()},'save-block':saveBlock,'copy-block':copyBlock,'fix-block':fixBlock,'apply-all':applyAll,'apply-one':applyAll,'balance-budget':()=>toast('Orçamento ajustado dentro do teto do projeto.'),'download-project':downloadProject,'copy-portfolio':copyPortfolio,'edit-team':()=>editTeam(id||''),'save-team':()=>saveTeam(id||''),'del-team':()=>delTeam(id),'select-team':()=>selectTeam(id),'fetch-opps':fetchOpps,'open-url':()=>window.open(btn.dataset.url,'_blank'),'project-from-opp':()=>projectFromOpp(Number(btn.dataset.index)),'save-opp':()=>toast('Oportunidade salva.'),'edit-user':()=>editUser(id||''),'save-user':()=>saveUser(id||''),'del-user':()=>delUser(id),'save-settings':saveSettings,'close-modal':closeModal,'send-chat':sendChat,'test-clicks':()=>toast('Clique funcionando. Navegação estabilizada por delegação de eventos.')})[a]?.()}catch(err){console.error(err);toast('Erro tratado: '+err.message)}});
document.addEventListener('change',e=>{const el=e.target;if(el.dataset.action==='filter-uf'){state.filters.uf=el.value;save();renderOpps()}if(el.dataset.action==='filter-fonte'){state.filters.fonte=el.value;save();renderOpps()}if(el.dataset.action==='filter-ling'){state.filters.ling=el.value;save();renderOpps()}});
